{{define "content"}}
<div class="row mb-3">
    <div class="col-12">
        <h1 class="fs-4 fw-semibold mb-1">Profil</h1>
        <p class="text-muted small mb-0">Ubah nama tampilan atau kata sandi</p>
    </div>
</div>

{{if .Success}}
<div class="alert alert-success py-2 small">✅ Berhasil disimpan</div>
{{end}}
{{if .Error}}
<div class="alert alert-danger py-2 small">❌ {{.Error}}</div>
{{end}}

<div class="row g-3" style="max-width:500px">
    <div class="col-12">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-header border-bottom-0 py-3"><h5 class="mb-0 fs-6 fw-semibold"><i class="ti ti-user me-2 text-primary"></i>Ubah Nama</h5></div>
            <div class="card-body p-3">
                <form method="POST" action="/profile">
                    <input type="hidden" name="action" value="name">
                    <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
                    <div class="mb-3">
                        <label class="form-label small">Nama Tampilan</label>
                        <input type="text" name="display" class="form-control" value="{{.DisplayName}}" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm">Simpan Nama</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-12">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-header border-bottom-0 py-3"><h5 class="mb-0 fs-6 fw-semibold"><i class="ti ti-lock me-2 text-primary"></i>Ubah Kata Sandi</h5></div>
            <div class="card-body p-3">
                <form method="POST" action="/profile">
                    <input type="hidden" name="action" value="password">
                    <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
                    <div class="mb-3">
                        <label class="form-label small">Kata Sandi Lama</label>
                        <div class="input-group">
                            <input type="password" name="old" id="pw-old" class="form-control" required>
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePW('pw-old',this)" tabindex="-1"><i class="ti ti-eye"></i></button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Kata Sandi Baru</label>
                        <div class="input-group">
                            <input type="password" name="new" id="pw-new" class="form-control" required minlength="6">
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePW('pw-new',this)" tabindex="-1"><i class="ti ti-eye"></i></button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Konfirmasi Sandi Baru</label>
                        <div class="input-group">
                            <input type="password" name="confirm" id="pw-confirm" class="form-control" required>
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePW('pw-confirm',this)" tabindex="-1"><i class="ti ti-eye"></i></button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm">Simpan Sandi</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-12">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-header border-bottom-0 py-3"><h5 class="mb-0 fs-6 fw-semibold"><i class="ti ti-info-circle me-2 text-primary"></i>Info Akun</h5></div>
            <div class="card-body p-3">
                <div class="d-flex justify-content-between py-1"><span class="text-muted small">Pengguna</span><span class="fw-medium small">{{.Username}}</span></div>
                <div class="d-flex justify-content-between py-1"><span class="text-muted small">Nama</span><span class="fw-medium small">{{.DisplayName}}</span></div>
            </div>
        </div>
    </div>
</div>
{{end}}
{{define "pagescripts"}}{{end}}
