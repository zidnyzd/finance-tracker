{{define "content"}}
<div class="row mb-3">
    <div class="col-12">
        <h1 class="fs-4 fw-semibold mb-1">Transfer Antar Dompet</h1>
        <p class="text-muted small mb-0">Pindahkan saldo antar dompet — otomatis tercatat pemasukan & pengeluaran</p>
    </div>
</div>

<div class="card border-0 shadow-sm overflow-hidden" style="max-width:500px">
    <div class="card-body p-4">
        <form method="POST" action="/transfer">
            <input type="hidden" name="_csrf" value="{{.CSRFToken}}">

            <!-- Dari -->
            <div class="mb-3">
                <label class="form-label small fw-medium text-muted">Dari Dompet</label>
                <select name="from" class="form-select" required>
                    <option value="">Pilih dompet asal</option>
                    {{range .Accounts}}<option value="{{.ID}}">{{.Name}}</option>{{end}}
                </select>
            </div>

            <!-- Ke -->
            <div class="mb-3">
                <label class="form-label small fw-medium text-muted">Ke Dompet</label>
                <select name="to" class="form-select" required>
                    <option value="">Pilih dompet tujuan</option>
                    {{range .Accounts}}<option value="{{.ID}}">{{.Name}}</option>{{end}}
                </select>
            </div>

            <!-- Jumlah -->
            <div class="mb-3">
                <label class="form-label small fw-medium text-muted">Jumlah</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent fw-semibold border-end-0">Rp</span>
                    <input type="text" inputmode="numeric" class="form-control border-start-0 ps-0" placeholder="0" required oninput="formatCurrency(this)">
                </div>
                <input type="hidden" name="amount" id="amount_real">
            </div>

            <!-- Tanggal -->
            <div class="mb-3">
                <label class="form-label small fw-medium text-muted">Tanggal</label>
                <input type="datetime-local" id="datetimepicker" name="date" class="form-control" required>
            </div>

            <!-- Keterangan -->
            <div class="mb-4">
                <label class="form-label small fw-medium text-muted">Keterangan <span class="text-muted">(opsional)</span></label>
                <input type="text" name="description" placeholder="Misal: Nabung, Bayar tagihan" class="form-control">
            </div>

            <!-- Tombol -->
            <div class="d-flex gap-2">
                <a href="/" class="btn btn-outline-secondary flex-fill py-2">Batal</a>
                <button type="submit" class="btn btn-primary flex-fill py-2 fw-semibold"><i class="ti ti-arrows-exchange me-1"></i> Transfer</button>
            </div>
        </form>
    </div>
</div>
{{end}}
{{define "pagescripts"}}{{end}}
